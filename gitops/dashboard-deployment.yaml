apiVersion: apps/v1
kind: Deployment
metadata:
  name: soil-moisture-dashboard
  namespace: soil-moisture
  labels:
    app: soil-moisture-dashboard
    app.kubernetes.io/name: soil-moisture-dashboard
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: soil-moisture-probe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soil-moisture-dashboard
  template:
    metadata:
      labels:
        app: soil-moisture-dashboard
        app.kubernetes.io/name: soil-moisture-dashboard
        app.kubernetes.io/component: ui
        app.kubernetes.io/part-of: soil-moisture-probe
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/gabzz01/soil-moisture-probe/dashboard:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: INFLUXDB_URL
              value: "http://influxdb.influxdb.svc.cluster.local:8181"
            - name: INFLUXDB_DATABASE
              value: "soil"
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dashboard-env
                  key: INFLUXDB_TOKEN
            - name: DATA_PATH
              value: "/data/data.json"
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dashboard-data
